<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->

    ></script>
    <script>

      function gtag() {

      gtag("config", "G-BR9D7E8713");

    <meta
      name="google-site-verification"
      content="20-U9Ao1kMNfy1XUvNZZzcgx8sNvmF_Pr65xhU6A81U"
    />
    <meta charset="UTF-8" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta
      name="description"
      content="Currency Converter is a plain and simple converter between Euros and GBP"
    />
    <meta
      name="viewport"
      content="initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />

    <link
      rel="canonical"
      href="https://kaz-currency-converter.netlify.app/about.html"
    />

    <title>Currency Converter</title>
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <!-- Apple Touch Icon (for iOS home screen) -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <!-- Favicon -->
    <link rel="icon" href="/icons/favicon-64x64.ico" />
    <meta name="theme-color" content="#0a0c0d" />

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="nebula-bg">
    <main class="main-layout">
      <!-- Background decorative image -->
      <div class="bg-decorative">
        <div class="decorative-bg-image"></div>
      </div>

      <div class="content-container">
        <!-- Header Section -->
        <section class="app-header">
          <p class="header-tagline">Live Currency Converter using Real Time Rates</p>
          <h2 class="app-title">Currency Converter</h2>
          
          <!-- Loading Indicator -->
          <div id="loadingIndicator" class="hidden">
            <span class="loader loader-small"></span> Updating rates...
          </div>
        </section>

        <!-- Converter Bento Stack -->
        <div class="converter-stack">
          <!-- Sell Card -->
          <div class="glass-card">
            <div class="card-header">
              <span class="label-text">From Amount</span>
              <div class="custom-select" id="fromSelectWrapper">
                <button class="select-trigger" id="fromTrigger">
                  <div class="flag-container">
                    <img src="https://flagcdn.com/w40/eu.png" alt="" class="select-flag">
                  </div>
                  <span class="selected-code">EUR</span>
                  <span class="material-symbols-outlined">expand_more</span>
                </button>
                <div class="select-options hidden">
                  <div class="option" data-value="EUR"><img src="https://flagcdn.com/w40/eu.png" class="option-flag"> EUR</div>
                  <div class="option" data-value="GBP"><img src="https://flagcdn.com/w40/gb.png" class="option-flag"> GBP</div>
                  <div class="option" data-value="USD"><img src="https://flagcdn.com/w40/us.png" class="option-flag"> USD</div>
                  <div class="option" data-value="JPY"><img src="https://flagcdn.com/w40/jp.png" class="option-flag"> JPY</div>
                  <div class="option" data-value="CAD"><img src="https://flagcdn.com/w40/ca.png" class="option-flag"> CAD</div>
                  <div class="option" data-value="AUD"><img src="https://flagcdn.com/w40/au.png" class="option-flag"> AUD</div>
                  <div class="option" data-value="CHF"><img src="https://flagcdn.com/w40/ch.png" class="option-flag"> CHF</div>
                  <div class="option" data-value="SEK"><img src="https://flagcdn.com/w40/se.png" class="option-flag"> SEK</div>
                  <div class="option" data-value="NOK"><img src="https://flagcdn.com/w40/no.png" class="option-flag"> NOK</div>
                  <div class="option" data-value="DKK"><img src="https://flagcdn.com/w40/dk.png" class="option-flag"> DKK</div>
                  <div class="option" data-value="PLN"><img src="https://flagcdn.com/w40/pl.png" class="option-flag"> PLN</div>
                  <div class="option" data-value="CZK"><img src="https://flagcdn.com/w40/cz.png" class="option-flag"> CZK</div>
                </div>
              </div>
              <!-- Hidden input to store value for existing script logic -->
              <input type="hidden" id="fromCurrency" value="EUR">
            </div>
            <div class="input-row">
              <div class="amount-input-group">
                <span id="fromSymbol" class="amount-symbol">€</span>
                <input class="amount-field" type="number" id="amount" value="1.00" step="0.01" inputmode="decimal"/>
              </div>
            </div>
          </div>

          <!-- Swap Action -->
          <div class="swap-container">
            <button id="swapBtn" class="btn-swap">
              <span class="material-symbols-outlined font-bold">swap_vert</span>
            </button>
          </div>

          <!-- Buy Card -->
          <div class="glass-card">
            <div class="card-header">
              <span class="label-text">To Amount</span>
              <div class="custom-select" id="toSelectWrapper">
                <button class="select-trigger" id="toTrigger">
                  <div class="flag-container">
                    <img src="https://flagcdn.com/w40/gb.png" alt="" class="select-flag">
                  </div>
                  <span class="selected-code">GBP</span>
                  <span class="material-symbols-outlined">expand_more</span>
                </button>
                <div class="select-options hidden">
                  <div class="option" data-value="EUR"><img src="https://flagcdn.com/w40/eu.png" class="option-flag"> EUR</div>
                  <div class="option" data-value="GBP"><img src="https://flagcdn.com/w40/gb.png" class="option-flag"> GBP</div>
                  <div class="option" data-value="USD"><img src="https://flagcdn.com/w40/us.png" class="option-flag"> USD</div>
                  <div class="option" data-value="JPY"><img src="https://flagcdn.com/w40/jp.png" class="option-flag"> JPY</div>
                  <div class="option" data-value="CAD"><img src="https://flagcdn.com/w40/ca.png" class="option-flag"> CAD</div>
                  <div class="option" data-value="AUD"><img src="https://flagcdn.com/w40/au.png" class="option-flag"> AUD</div>
                  <div class="option" data-value="CHF"><img src="https://flagcdn.com/w40/ch.png" class="option-flag"> CHF</div>
                  <div class="option" data-value="SEK"><img src="https://flagcdn.com/w40/se.png" class="option-flag"> SEK</div>
                  <div class="option" data-value="NOK"><img src="https://flagcdn.com/w40/no.png" class="option-flag"> NOK</div>
                  <div class="option" data-value="DKK"><img src="https://flagcdn.com/w40/dk.png" class="option-flag"> DKK</div>
                  <div class="option" data-value="PLN"><img src="https://flagcdn.com/w40/pl.png" class="option-flag"> PLN</div>
                  <div class="option" data-value="CZK"><img src="https://flagcdn.com/w40/cz.png" class="option-flag"> CZK</div>
                </div>
              </div>
              <!-- Hidden input to store value for existing script logic -->
              <input type="hidden" id="toCurrency" value="GBP">
            </div>
            <div class="input-row">
              <div class="amount-input-group">
                <span id="toSymbol" class="amount-symbol">£</span>
                <div id="result" class="result-value">0.00</div>
              </div>
              <div id="liveRateDisplay" class="rate-info">
                1 EUR = <span id="currentRateValue">...</span> GBP
              </div>
            </div>
          </div>
        </div>

        <!-- Execute Button -->
        <button id="convertBtn" class="primary-action-btn">
          <span>Convert</span>
          <span class="material-symbols-outlined fill-icon">bolt</span>
        </button>

        <!-- Recent Conversions Log -->
        <section id="conversionHistory" class="history-section hidden">
            <div class="history-header">
                <p class="header-tagline">Recent Conversions</p>
                <div class="history-actions">
                    <button id="exportHistoryBtn" class="btn-history-action">Export CSV</button>
                    <button id="clearHistoryBtn" class="btn-history-action">Clear History</button>
                </div>
            </div>
            <div id="historyList" class="history-stack"></div>
        </section>

        <!-- Message Box -->
        <div id="messageBox" class="message-box hidden" role="alert">
          <span id="messageText" class="message-text-style"></span>
          <button class="btn-close-msg btn-close-msg-style">&times;</button>
        </div>

        <!-- Footer Links -->
        <div class="footer-nav">
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </div>
      </div>
    </main>
    <script src="script.js" defer></script>
  </body>
</html>
