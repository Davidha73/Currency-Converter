<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-BR9D7E8713"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-BR9D7E8713");
    </script>
    <meta
      name="google-site-verification"
      content="20-U9Ao1kMNfy1XUvNZZzcgx8sNvmF_Pr65xhU6A81U"
    />
    <meta charset="UTF-8" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta
      name="description"
      content="Currency Converter is a plain and simple converter between Euros and GBP"
    />
    <meta
      name="viewport"
      content="initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />

    <link
      rel="canonical"
      href="https://kaz-currency-converter.netlify.app/about.html"
    />

    <title>Live EUR/GBP Converter</title>
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <!-- Apple Touch Icon (for iOS home screen) -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <!-- Favicon -->
    <link rel="icon" href="/icons/favicon-64x64.ico" />
    <!-- Theme color for browser UI -->
    <meta name="theme-color" content="#f0f2f5" />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>
        <img src="/icons/icon-192x192.png" alt="icon" />
        Live Currency Converter
      </h1>

      <!-- Loading Indicator -->
      <div id="loadingIndicator" class="text-center loading-text hidden">
        <span class="loader"></span> Fetching live rates...
      </div>

      <!-- Live Rate Display -->
      <div id="liveRateDisplay" class="text-center live-rate-text">
        Current Rate: 1 EUR =
        <span id="currentRateValue" class="font-semibold">N/A</span> GBP
      </div>

      <!-- Input Amount Section -->
      <div class="input-group">
        <label for="amount">Amount:</label>
        <input
          type="text"
          inputmode="decimal"
          pattern="[0-9]*(\.|,)[0-9]*"
          id="amount"
          value="1.00"
          min="0"
          step="0.01"
          onfocus="this.select()"
          class="input-field"
        />
      </div>

      <!-- Currency Selection Section -->
      <div class="relative flex-col gap-4 currency-selection">
        <div class="input-group">
          <label for="fromCurrency">From:</label>
          <select id="fromCurrency" class="select-field">
            <option value="EUR" selected>EUR - Euro</option>
            <option value="GBP">GBP - British Pound</option>
            <option value="USD">USD - US Dollar</option>
            <option value="JPY">JPY - Japanese Yen</option>
          </select>
        </div>

        <div class="input-group">
          <label for="toCurrency">To:</label>
          <select id="toCurrency" class="select-field">
            <option value="GBP" selected>GBP - British Pound</option>
            <option value="EUR">EUR - Euro</option>
            <option value="USD">USD - US Dollar</option>
            <option value="JPY">JPY - Japanese Yen</option>
          </select>
        </div>

        <!-- Floating Swap Button -->
        <button
          id="swapBtn"
          type="button"
          aria-label="Swap currencies"
          class="btn-swap"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"
            />
          </svg>
        </button>
      </div>

      <!-- Convert Button -->
      <button id="convertBtn" class="btn-convert">Convert</button>

      <!-- Result Display Section -->
      <div class="result-container">
        <p class="result-label">Converted Amount:</p>
        <p id="result" class="result-value">0.00 GBP</p>
      </div>

      <!-- Message Box for Alerts -->
      <div id="messageBox" class="message-box hidden" role="alert">
        <span id="messageText"></span>
        <button
          class="btn-close-msg"
          onclick="document.getElementById('messageBox').classList.add('hidden');"
        >
          &times;
        </button>
      </div>
    </div>

    <div class="main-footer-text">
      <a href="about.html" id="aboutLink">About</a>
      <a href="contact.html" id="contactLink">Contact</a>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
